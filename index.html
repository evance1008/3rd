<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ縦画面ファースト。ピンチズームはglobe.gl側で扱うためuser-scalable=no -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>世界の国図鑑 - 3D地球儀</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- 地球儀の描画先 -->
  <div id="globe"></div>

  <!-- 読み込み失敗時のフォールバック表示(エラーで白画面にしない) -->
  <div id="error-message" hidden>
    地球儀の読み込みに失敗しました。通信環境を確認して再読み込みしてください。
  </div>

  <!-- フェーズ3: 選択した国の基本情報を表示するボトムシート -->
  <div id="info-panel" class="info-panel" aria-hidden="true">
    <div id="info-panel-handle" class="info-panel__handle" aria-hidden="true"></div>
    <button id="info-panel-close" class="info-panel__close" type="button" aria-label="閉じる">×</button>
    <div class="info-panel__content">
      <div class="info-panel__flag">
        <img id="info-flag-img" alt="">
        <span id="info-flag-emoji" class="info-panel__flag-emoji" hidden></span>
      </div>
      <h2 id="info-name-ja" class="info-panel__name-ja"></h2>
      <p id="info-name-en" class="info-panel__name-en"></p>

      <dl class="info-panel__facts">
        <div id="info-row-capital" class="info-panel__row" hidden>
          <dt>首都</dt><dd id="info-capital"></dd>
        </div>
        <div id="info-row-population" class="info-panel__row" hidden>
          <dt>人口</dt><dd id="info-population"></dd>
        </div>
        <div id="info-row-area" class="info-panel__row" hidden>
          <dt>面積</dt><dd id="info-area"></dd>
        </div>
        <div id="info-row-languages" class="info-panel__row info-panel__row--block" hidden>
          <dt>公用語</dt>
          <dd><div id="info-languages" class="chip-list"></div></dd>
        </div>
        <div id="info-row-currencies" class="info-panel__row info-panel__row--block" hidden>
          <dt>通貨</dt><dd id="info-currencies"></dd>
        </div>
      </dl>
      <!-- フェーズ4引き継ぎ: ここ(facts末尾)に料理・挨拶、フェーズ5で国歌・観光地を追加する想定 -->
    </div>
  </div>

  <footer id="attribution">
    Globe texture: NASA Blue Marble / Border data: Natural Earth /
    Library: <a href="https://globe.gl/" target="_blank" rel="noopener">globe.gl</a>
  </footer>

  <!-- globe.gl をCDNから読み込み(ビルド不要) -->
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.46.1/dist/globe.gl.min.js"></script>
  <script>
    // フェーズ2: 193カ国すべてをタップ可能にする(ポリゴン165カ国 + ピン28カ国)
    (function () {
      // ドラッグ回転とタップ(国選択)を区別するための移動量しきい値(px)
      const DRAG_THRESHOLD_PX = 5;

      // 色設定(ハイライト・選択・通常)
      const COLOR_HOVER = 'rgba(255, 210, 60, 0.75)';
      const COLOR_SELECTED = 'rgba(255, 90, 90, 0.8)';
      const COLOR_DEFAULT_CAP = 'rgba(200, 200, 200, 0.35)';
      const COLOR_SIDE = 'rgba(80, 120, 200, 0.15)';
      const COLOR_STROKE = '#222';
      const COLOR_POINT_DEFAULT = '#ffa500';

      // フェーズ3で使うグローバル状態: 選択中の国のcca3(未選択はnull)
      window.selectedCountryCca3 = null;

      // ホバー中のフィーチャー/ポイント(色の再計算に使う)
      let hoveredPolygon = null;
      let hoveredPointCca3 = null;

      // ドラッグ判定用の状態
      let pointerDownPos = null;
      let isDragging = false;

      const container = document.getElementById('globe');

      // initGlobe内で定義される色再計算関数への参照(閉じる操作から呼べるようにする)
      let refreshColorsRef = null;

      // ---- フェーズ3: 情報パネル(ボトムシート) ----
      const panelEl = document.getElementById('info-panel');
      const panelHandleEl = document.getElementById('info-panel-handle');
      const panelCloseBtn = document.getElementById('info-panel-close');
      const flagImgEl = document.getElementById('info-flag-img');
      const flagEmojiEl = document.getElementById('info-flag-emoji');
      const nameJaEl = document.getElementById('info-name-ja');
      const nameEnEl = document.getElementById('info-name-en');
      const rowCapitalEl = document.getElementById('info-row-capital');
      const capitalEl = document.getElementById('info-capital');
      const rowPopulationEl = document.getElementById('info-row-population');
      const populationEl = document.getElementById('info-population');
      const rowAreaEl = document.getElementById('info-row-area');
      const areaEl = document.getElementById('info-area');
      const rowLanguagesEl = document.getElementById('info-row-languages');
      const languagesEl = document.getElementById('info-languages');
      const rowCurrenciesEl = document.getElementById('info-row-currencies');
      const currenciesEl = document.getElementById('info-currencies');

      const numberFormatter = new Intl.NumberFormat('ja-JP');

      /** ISO 3166-1 alpha-2 コードから国旗絵文字を作る(画像読み込み失敗時のフォールバック) */
      function cca2ToFlagEmoji(cca2) {
        if (!cca2 || cca2.length !== 2) return '🏳️';
        const codePoints = cca2.toUpperCase().split('').map((ch) => 127397 + ch.charCodeAt(0));
        return String.fromCodePoint(...codePoints);
      }

      /** 値があれば行を表示してテキストを設定し、無ければ行ごと隠す(レイアウトを崩さない) */
      function setRow(rowEl, valueEl, value) {
        if (value === null || value === undefined || value === '') {
          rowEl.hidden = true;
          return;
        }
        valueEl.textContent = value;
        rowEl.hidden = false;
      }

      /** 選択国の情報をパネルに描画する */
      function renderPanel(country) {
        // 国旗: flagcdnを直接使用し、読み込み失敗時は絵文字にフォールバックする
        flagImgEl.hidden = false;
        flagEmojiEl.hidden = true;
        flagImgEl.onerror = () => {
          flagImgEl.hidden = true;
          flagEmojiEl.hidden = false;
          flagEmojiEl.textContent = cca2ToFlagEmoji(country.cca2);
        };
        if (country.cca2) {
          flagImgEl.alt = `${country.name.ja || country.cca3}の国旗`;
          flagImgEl.src = `https://flagcdn.com/${country.cca2.toLowerCase()}.svg`;
        } else {
          flagImgEl.onerror();
        }

        nameJaEl.textContent = (country.name && country.name.ja) || '(国名不明)';
        nameEnEl.textContent = (country.name && country.name.common) || '';

        setRow(rowCapitalEl, capitalEl, country.capital);
        setRow(
          rowPopulationEl,
          populationEl,
          typeof country.population === 'number' ? `${numberFormatter.format(country.population)}人` : null
        );
        setRow(
          rowAreaEl,
          areaEl,
          typeof country.area === 'number' ? `${numberFormatter.format(country.area)}km²` : null
        );

        // 公用語(チップ形式、件数上限なし)
        if (Array.isArray(country.languages) && country.languages.length > 0) {
          languagesEl.innerHTML = '';
          country.languages.forEach((lang) => {
            const chip = document.createElement('span');
            chip.className = 'chip';
            chip.textContent = lang.name;
            languagesEl.appendChild(chip);
          });
          rowLanguagesEl.hidden = false;
        } else {
          rowLanguagesEl.hidden = true;
        }

        // 通貨(複数ある場合は「、」区切りで全て表示。コード・名称・記号を併記)
        if (Array.isArray(country.currencies) && country.currencies.length > 0) {
          const text = country.currencies
            .map((cur) => {
              const label = [cur.code, cur.name].filter(Boolean).join(' ');
              return cur.symbol ? `${label} (${cur.symbol})` : label;
            })
            .filter(Boolean)
            .join('、');
          setRow(rowCurrenciesEl, currenciesEl, text || null);
        } else {
          rowCurrenciesEl.hidden = true;
        }
      }

      function openPanel(country) {
        renderPanel(country);
        panelEl.classList.add('open');
        panelEl.setAttribute('aria-hidden', 'false');
      }

      function closePanel() {
        panelEl.classList.remove('open');
        panelEl.setAttribute('aria-hidden', 'true');
        window.selectedCountryCca3 = null;
        if (typeof refreshColorsRef === 'function') refreshColorsRef();
      }

      /** 国を選択状態にして情報パネルを開く共通処理 */
      function selectCountry(cca3, countryByCca3) {
        window.selectedCountryCca3 = cca3;
        console.log('選択された国:', cca3);
        // countries.jsonにレコードが無い場合も、cca3だけのフォールバック情報でパネルを開く
        const country = countryByCca3.get(cca3) || { cca3, cca2: null, name: { ja: null, common: null } };
        openPanel(country);
      }

      // 閉じるボタン
      panelCloseBtn.addEventListener('click', closePanel);

      // ハンドルの下スワイプで閉じる(コンテンツのスクロールと干渉しないようハンドル領域のみで判定)
      (function setupSwipeToClose() {
        const SWIPE_CLOSE_THRESHOLD_PX = 80;
        let startY = null;

        function onPointerMove(e) {
          if (startY === null) return;
          const dy = Math.max(0, e.clientY - startY);
          panelEl.style.transition = 'none';
          panelEl.style.transform = `translateY(${dy}px)`;
        }

        function onPointerUp(e) {
          if (startY === null) return;
          const dy = e.clientY - startY;
          panelEl.style.transition = '';
          panelEl.style.transform = '';
          startY = null;
          window.removeEventListener('pointermove', onPointerMove);
          window.removeEventListener('pointerup', onPointerUp);
          if (dy > SWIPE_CLOSE_THRESHOLD_PX) closePanel();
        }

        panelHandleEl.addEventListener('pointerdown', (e) => {
          startY = e.clientY;
          window.addEventListener('pointermove', onPointerMove);
          window.addEventListener('pointerup', onPointerUp);
        });
      })();

      function main() {
        Promise.all([
          fetch('data/countries.json').then((res) => res.json()),
          fetch('data/world-110m.geojson').then((res) => res.json()),
        ])
          .then(([countries, geoJson]) => initGlobe(countries, geoJson))
          .catch((err) => {
            console.error('データの読み込みに失敗しました:', err);
            document.getElementById('error-message').hidden = false;
          });
      }

      function initGlobe(countries, geoJson) {
        const countryByCca3 = new Map(countries.map((c) => [c.cca3, c]));

        // ポリゴンが無い国(小島嶼国・都市国家)はピン表示にフォールバック
        const pointCountries = countries
          .filter((c) => c.geoType === 'point' && Array.isArray(c.latlng))
          .map((c) => ({
            cca3: c.cca3,
            name: c.name.ja,
            lat: c.latlng[0],
            lng: c.latlng[1],
          }));

        // 起動時の検証: 193カ国全てがポリゴンかピンいずれかでタップ可能か確認する
        validateCoverage(countries, geoJson, pointCountries);

        const globe = Globe()(container)
          // 地球のテクスチャ(NASA Blue Marble)+ 地形の凹凸(bump map)
          .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
          .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
          .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
          .width(window.innerWidth)
          .height(window.innerHeight)
          // 国境ポリゴン(165カ国)
          .polygonsData(geoJson.features)
          .polygonAltitude(0.006)
          .polygonSideColor(() => COLOR_SIDE)
          .polygonStrokeColor(() => COLOR_STROKE)
          .polygonLabel((d) => `<div>${d.properties.name}</div>`)
          .polygonsTransitionDuration(200)
          // ポリゴンが無い28カ国のピン表示
          .pointsData(pointCountries)
          .pointLat('lat')
          .pointLng('lng')
          .pointAltitude(0.01)
          .pointRadius(0.4)
          .pointLabel((d) => `<div>${d.name}</div>`)
          // pointsMergeが無効(false)の場合のみポイント個別のonPointClickが動作する
          .pointsMerge(false);

        // ハイライト・選択色を反映する(公式exampleと同様、ホバー時にアクセサを再設定する方式)
        function refreshColors() {
          globe
            .polygonCapColor((d) => {
              if (d === hoveredPolygon) return COLOR_HOVER;
              if (d.properties.cca3 === window.selectedCountryCca3) return COLOR_SELECTED;
              return COLOR_DEFAULT_CAP;
            })
            .pointColor((d) => {
              if (d.cca3 === hoveredPointCca3) return COLOR_HOVER;
              if (d.cca3 === window.selectedCountryCca3) return COLOR_SELECTED;
              return COLOR_POINT_DEFAULT;
            });
        }
        refreshColors();
        refreshColorsRef = refreshColors;

        globe
          .onPolygonHover((d) => {
            hoveredPolygon = d;
            refreshColors();
          })
          .onPointHover((d) => {
            hoveredPointCca3 = d ? d.cca3 : null;
            refreshColors();
          })
          .onPolygonClick((polygon, event, { lat, lng, altitude }) => {
            // ドラッグ回転の終わりに発生するクリックは無視する(タップのみ処理)
            if (isDragging) return;
            const cca3 = polygon.properties.cca3;
            console.log('国タップ(ポリゴン):', cca3, { lat, lng, altitude });
            selectCountry(cca3, countryByCca3);
            refreshColors();
          })
          .onPointClick((point, event, { lat, lng, altitude }) => {
            if (isDragging) return;
            console.log('国タップ(ピン):', point.cca3, { lat, lng, altitude });
            selectCountry(point.cca3, countryByCca3);
            refreshColors();
          })
          // ポリゴン・ピンの無い地球儀の背景(海など)をタップした場合はパネルを閉じる
          .onGlobeClick(() => {
            if (isDragging) return;
            closePanel();
          });

        // 自動回転(ドラッグ中は一時停止し、離すと再開する)
        const controls = globe.controls();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.addEventListener('start', () => {
          controls.autoRotate = false;
        });
        controls.addEventListener('end', () => {
          controls.autoRotate = true;
        });

        // タップとドラッグ回転を区別するための独自判定(pointerdown→pointerupの移動量で判定)
        container.addEventListener('pointerdown', (e) => {
          pointerDownPos = { x: e.clientX, y: e.clientY };
          isDragging = false;
        }, { passive: true });

        container.addEventListener('pointermove', (e) => {
          if (!pointerDownPos) return;
          const dx = e.clientX - pointerDownPos.x;
          const dy = e.clientY - pointerDownPos.y;
          if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD_PX) {
            isDragging = true;
          }
        }, { passive: true });

        container.addEventListener('pointerup', () => {
          pointerDownPos = null;
        }, { passive: true });

        // 画面サイズが変わったら(スマホの回転など)地球儀もリサイズ
        window.addEventListener('resize', () => {
          globe.width(window.innerWidth).height(window.innerHeight);
        });
      }

      /** 193カ国全てがポリゴンかピンいずれかでタップ可能かを検証し、結果をログ出力する */
      function validateCoverage(countries, geoJson, pointCountries) {
        const polygonCca3Set = new Set(geoJson.features.map((f) => f.properties.cca3));
        const pointCca3Set = new Set(pointCountries.map((c) => c.cca3));

        console.log(
          `カバレッジ検証: ポリゴン表示 ${polygonCca3Set.size}カ国 + ピン表示 ${pointCca3Set.size}カ国 `
          + `= 計 ${polygonCca3Set.size + pointCca3Set.size}カ国(countries.json: ${countries.length}カ国)`
        );

        const missing = countries.filter(
          (c) => !polygonCca3Set.has(c.cca3) && !pointCca3Set.has(c.cca3)
        );
        if (missing.length > 0) {
          console.warn(
            'タップ不可能な国があります:',
            missing.map((c) => `${c.cca3}(${c.name.ja})`)
          );
        }
      }

      try {
        main();
      } catch (err) {
        console.error('地球儀の初期化に失敗しました:', err);
        document.getElementById('error-message').hidden = false;
      }
    })();
  </script>
</body>
</html>
